<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calculadora Fragmentada</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calc-card">
        <input type="number" id="num1" placeholder="Número A">
        <input type="number" id="num2" placeholder="Número B">
        
        <div class="botones">
            <button id="btn-sumar">Sumar (+)</button>
            <button id="btn-restar">Restar (-)</button>
            <button id="btn-multi">Multiplicar (*)</button>
            <button id="btn-dividir">Dividir (/)</button>
        </div>

        <p id="resultado">Esperando operación...</p>
    </div>

    <script src="/assents/js/setup.js"></script> 
    <script src="/assents/js/sumar.js"></script> 
    <script src="/assents/js/restar.js"></script> 
    <script src="/assents/js/dividir.js"></script>
    <script src="/assents/js/multiplicar.js"></script> </body>
</html>
